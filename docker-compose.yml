version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: betpredict
      POSTGRES_USER: betpredict
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-betpredict_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U betpredict"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.migrate
    environment:
      DATABASE_URL: postgresql://betpredict:${POSTGRES_PASSWORD:-betpredict_secret}@db:5432/betpredict
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 8080
      DATABASE_URL: postgresql://betpredict:${POSTGRES_PASSWORD:-betpredict_secret}@db:5432/betpredict
      FOOTBALL_DATA_API_KEY: ${FOOTBALL_DATA_API_KEY}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      STATIC_DIR: /app/public
    ports:
      - "${APP_PORT:-8080}:8080"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:8080/api/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3

volumes:
  postgres_data:
